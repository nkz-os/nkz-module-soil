apiVersion: apps/v1
kind: Deployment
metadata:
  name: soil-module-worker
  namespace: nekazari
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soil-module-worker
  template:
    metadata:
      labels:
        app: soil-module-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/nkz-os/nkz-module-soil/soil-worker@sha256:ff02c100c1a761bf28dc2772683f47869800c1fda830358a82b51ce52f62a7d9
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: soil-module-config
            - secretRef:
                name: soil-module-secret
          env:
            # pg-dsn has a hyphen, so envFrom secretRef cannot expose it as an env
            # var (invalid name) — map it explicitly. The worker cascade needs it.
            - name: SOIL_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: soil-module-secret
                  key: pg-dsn
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            - name: ORION_LD_URL
              value: "http://orion-ld-service:1026"
            - name: ORION_BASE_URL
              value: "http://orion-ld-service:1026"
            - name: MINIO_ENDPOINT
              value: "http://minio-service:9000"
            - name: CONTEXT_URL
              value: "http://api-gateway-service:5000/ngsi-ld-context.json"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "python -c \"from arq.connections import ArqRedis; import asyncio; asyncio.run(ArqRedis.from_url('${REDIS_URL}').info())\""
            initialDelaySeconds: 15
            periodSeconds: 30
