apiVersion: apps/v1
kind: Deployment
metadata:
  name: soil-module-worker
  namespace: nekazari
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soil-module-worker
  template:
    metadata:
      labels:
        app: soil-module-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/nkz-os/nkz-module-soil/soil-worker@sha256:993b24ea73618e81c9f1e09a15144e36c64d4a7438ccbbb96f242d868368e4a4  # master f7996b2: Fix soil parcel API paths and AgriSoilExtended lookup
          command: ["arq", "nkz_soil.workers.ingest.WorkerSettings"]
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: soil-module-config
                optional: true
            - secretRef:
                name: soil-module-secret
                optional: false
          env:
            # pg-dsn has a hyphen, so envFrom secretRef cannot expose it as an env
            # var (invalid name) — map it explicitly. The worker cascade needs it.
            - name: SOIL_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: soil-module-secret
                  key: pg-dsn
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: password
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
            - name: ORION_LD_URL
              value: "http://orion-ld-service:1026"
            - name: ORION_BASE_URL
              value: "http://orion-ld-service:1026"
            - name: MINIO_ENDPOINT
              value: "http://minio-service:9000"
            - name: CONTEXT_URL
              value: "http://api-gateway-service:5000/ngsi-ld-context.json"
            - name: REQUIRE_HMAC_SIGNATURE
              value: "true"
            - name: HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: jwt-secret
                  key: secret
            - name: SOIL_DEFAULT_TENANT
              value: "platform"
            # Platform DB for dynamic tenant discovery (tenant_installed_modules).
            # NOT the soil module DB (SOIL_PG_DSN). Mirrors weather-map/weather-worker.
            - name: POSTGRES_HOST
              value: "postgresql-service"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: "nekazari"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgresql-secret
                  key: password
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "python -c \"from arq.connections import ArqRedis; import asyncio; asyncio.run(ArqRedis.from_url('${REDIS_URL}').info())\""
            initialDelaySeconds: 15
            periodSeconds: 30
